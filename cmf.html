<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Call My Friends</title>

  <style>
    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: linear-gradient(135deg, #111827, #1f2937);
      color: white;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 30px 15px;
    }

    .container {
      width: 100%;
      max-width: 430px;
      background: #0f172a;
      border-radius: 25px;
      padding: 25px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    h1 {
      text-align: center;
      margin-bottom: 5px;
      font-size: 28px;
    }

    p {
      text-align: center;
      color: #94a3b8;
      margin-bottom: 25px;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-bottom: 12px;
      border: none;
      border-radius: 12px;
      outline: none;
      font-size: 15px;
      background: #1e293b;
      color: white;
    }

    input::placeholder {
      color: #94a3b8;
    }

    button {
      border: none;
      cursor: pointer;
      border-radius: 12px;
      font-weight: bold;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.03);
    }

    .add-btn {
      width: 100%;
      padding: 14px;
      background: #22c55e;
      color: white;
      font-size: 16px;
      margin-bottom: 20px;
    }

    .friend-card {
      background: #1e293b;
      padding: 15px;
      border-radius: 16px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .friend-info {
      overflow: hidden;
    }

    .friend-info h3 {
      margin: 0;
      font-size: 18px;
    }

    .friend-info span {
      color: #94a3b8;
      font-size: 14px;
    }

    .actions {
      display: flex;
      gap: 8px;
    }

    .call-btn {
      padding: 10px 13px;
      background: #3b82f6;
      color: white;
    }

    .delete-btn {
      padding: 10px 13px;
      background: #ef4444;
      color: white;
    }

    .empty {
      text-align: center;
      color: #94a3b8;
      margin-top: 25px;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>📞 Call My Friends</h1>
    <p>Add your friends and call them quickly</p>

    <input type="text" id="nameInput" placeholder="Friend name" />
    <input type="tel" id="phoneInput" placeholder="Phone number" />
    <button class="add-btn" onclick="addFriend()">Add Friend</button>

    <input type="text" id="searchInput" placeholder="Search friend..." oninput="displayFriends()" />

    <div id="friendsList"></div>
  </div>

  <script>
    let friends = JSON.parse(localStorage.getItem("friends")) || [
      { name: "Ahmed", phone: "0500000000" },
      { name: "Mohammed", phone: "0550000000" }
    ];

    function saveFriends() {
      localStorage.setItem("friends", JSON.stringify(friends));
    }

    function addFriend() {
      const name = document.getElementById("nameInput").value.trim();
      const phone = document.getElementById("phoneInput").value.trim();

      if (name === "" || phone === "") {
        alert("Please enter both name and phone number.");
        return;
      }

      friends.push({ name, phone });
      saveFriends();

      document.getElementById("nameInput").value = "";
      document.getElementById("phoneInput").value = "";

      displayFriends();
    }

    function callFriend(phone) {
      const cleanPhone = phone.replace(/\s+/g, "");
      window.location.href = "tel:" + cleanPhone;
    }

    function deleteFriend(index) {
      friends.splice(index, 1);
      saveFriends();
      displayFriends();
    }

    function displayFriends() {
      const list = document.getElementById("friendsList");
      const search = document.getElementById("searchInput").value.toLowerCase();

      list.innerHTML = "";

      const filteredFriends = friends.filter(friend =>
        friend.name.toLowerCase().includes(search) ||
        friend.phone.includes(search)
      );

      if (filteredFriends.length === 0) {
        list.innerHTML = `<div class="empty">No friends found</div>`;
        return;
      }

      filteredFriends.forEach((friend, index) => {
        const realIndex = friends.indexOf(friend);

        list.innerHTML += `
          <div class="friend-card">
            <div class="friend-info">
              <h3>${friend.name}</h3>
              <span>${friend.phone}</span>
            </div>

            <div class="actions">
              <button class="call-btn" onclick="callFriend('${friend.phone}')">Call</button>
              <button class="delete-btn" onclick="deleteFriend(${realIndex})">X</button>
            </div>
          </div>
        `;
      });
    }

    displayFriends();
  </script>
</body>
</html>
